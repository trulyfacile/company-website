<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truly Facile Ltd. | Business Card - Shahid Raza</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Brand Identity Colors */
            --clr-green: #35a34e;
            --clr-yellow: #f1b919;
            /* Matched from image */
            --clr-red: #ea4a3f;

            /* Neutral Palette */
            --clr-white: #ffffff;
            --clr-light-bg: #f3f4f6;
            --clr-gray: #4b5563;
            --clr-dark: #111827;

            /* Typography */
            --font-main: 'Inter', sans-serif;

            /* Structural */
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

            /* Card Dimensions (Approx 3.5" x 2") */
            --card-width: 450px;
            --card-height: 250px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--clr-light-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            flex-direction: column;
            gap: 3rem;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--clr-gray);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        /* Common Card Base */
        .business-card {
            width: var(--card-width);
            height: var(--card-height);
            background: var(--clr-white);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Multi-color Bottom Bar */
        .bottom-border {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            /* Slightly thicker as in image */
            display: flex;
            z-index: 10;
        }

        .border-segment {
            flex: 1;
            height: 100%;
        }

        .b-green {
            background: var(--clr-green);
        }

        .b-yellow {
            background: var(--clr-yellow);
        }

        .b-red {
            background: var(--clr-red);
        }

        /* --- FRONT SIDE --- */
        .front {
            display: flex;
            height: calc(var(--card-height) - 8px);
        }

        /* Branding Column (Left) */
        .front-branding {
            width: 35%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .logo-box {
            text-align: center;
        }

        .logo-box img {
            width: 90px;
            /* Refined size for better balance */
            margin-bottom: 0.6rem;
        }

        .logo-text {
            color: var(--clr-red);
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Info Column (Right) */
        .front-info {
            flex: 1;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.5rem;
        }

        .person-header {
            margin-bottom: 1.5rem;
        }

        .person-header h1 {
            font-size: 1.35rem;
            color: var(--clr-dark);
            font-weight: 700;
            margin-bottom: 2px;
        }

        .person-header h1 small {
            font-size: 0.85rem;
            color: var(--clr-gray);
            font-weight: 400;
            margin-left: 2px;
        }

        .title {
            color: var(--clr-green);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--clr-dark);
        }

        .contact-item i {
            color: var(--clr-yellow);
            width: 16px;
            text-align: center;
        }

        /* --- BACK SIDE --- */
        .back {
            background: var(--clr-white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 1.2rem; /* Balanced padding */
            gap: 0.5rem; /* Slightly tighter gap to save vertical space */
            /* Equalized vertical spacing */
        }

        .back-logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            /* Consistent spacing */
            z-index: 2;
        }

        .back-logo {
            width: 110px;
            margin-bottom: 0.1rem;
            /* Smaller gap for logo-to-brand connection */
        }

        .back-logo-text {
            color: var(--clr-red);
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .back-url {
            color: var(--clr-gray);
            font-size: 0.7rem;
            font-weight: 500;
        }

        .back-tagline {
            font-size: 0.75rem;
            color: var(--clr-gray);
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            z-index: 2;
            text-align: center;
            line-height: 1.2;
            max-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            /* Consistent spacing */
        }

        .back-tagline span {
            color: var(--clr-dark);
            font-weight: 700;
            display: block;
            font-size: 0.8rem;
        }

        .back-services {
            font-size: 0.5rem; /* Reduced to fit on one line easily */
            color: var(--clr-gray);
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            z-index: 2;
            white-space: nowrap;
            text-align: center;
            opacity: 0.8;
        }

        .qr-code {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            background: white;
            padding: 3px;
            border: 1px solid #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .qr-code i {
            font-size: 3.2rem;
            color: #333;
        }

        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @media print {
            body {
                background: none;
                padding: 0;
            }

            .label {
                display: none;
            }

            .business-card {
                box-shadow: none;
            }
        }
    </style>
</head>

<body>

    <div class="card-wrapper">
        <p class="label">Front Side</p>
        <div class="business-card">
            <div class="front">
                <div class="front-branding">
                    <div class="logo-box">
                        <img src="img/logo.svg" alt="TFL Logo"
                            onerror="this.onerror=null; this.src='https://via.placeholder.com/100x80?text=Logo';">

                    </div>
                </div>
                <div class="front-info">
                    <div class="person-header">
                        <h1>Shahid Raza, <small>MGIS | PMP</small></h1>
                        <p class="title">Principal Consultant</p>
                    </div>
                    <div class="contact-list">
                        <div class="contact-item">
                            <i class="fa-solid fa-phone"></i>
                            <span>403-462-6987</span>
                        </div>
                        <div class="contact-item">
                            <i class="fa-solid fa-envelope"></i>
                            <span>shahid.raza@trulyfacile.com</span>
                        </div>
                        <div class="contact-item">
                            <i class="fa-solid fa-globe"></i>
                            <span>trulyfacile.com</span>
                        </div>
                        <div class="contact-item">
                            <i class="fa-solid fa-location-dot"></i>
                            <span>Calgary, Alberta, Canada</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Bottom Border -->
            <div class="bottom-border">
                <div class="border-segment b-green"></div>
                <div class="border-segment b-yellow"></div>
                <div class="border-segment b-red"></div>
            </div>
        </div>
    </div>

    <div class="card-wrapper">
        <p class="label">Back Side</p>
        <div class="business-card back">
            <div class="back-logo-section">
                <img src="img/logo.svg" alt="TFL Logo" class="back-logo"
                    onerror="this.onerror=null; this.src='https://via.placeholder.com/120x100?text=Logo';">
                <p class="back-logo-text">Truly Facile Ltd.</p>
                <p class="back-url">trulyfacile.com</p>
            </div>
            <p class="back-tagline">Complex Problems<span>Truly Simple Solutions</span></p>
            <p class="back-services">System Integration · Geospatial Platforms · Process Optimization</p>

            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://trulyfacile.com"
                    alt="QR Code to trulyfacile.com" style="width: 100%; height: 100%; object-fit: contain;">
            </div>

            <!-- Bottom Border -->
            <div class="bottom-border">
                <div class="border-segment b-green"></div>
                <div class="border-segment b-yellow"></div>
                <div class="border-segment b-red"></div>
            </div>
        </div>
    </div>

</body>

</html>
