events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Limit payload
    client_max_body_size 20M;

    # ==========================
    # Main Website (trulyfacile.com)
    # ==========================
    server {
        listen 80;
        server_name trulyfacile.com www.trulyfacile.com localhost;

        location / {
            # Route to the docker service name 'website' on its internal port 80
            proxy_pass http://website:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==========================
    # Kimai Instance (time.trulyfacile.com)
    # ==========================
    server {
        listen 80;
        server_name time.trulyfacile.com;

        location / {
            # Route to the docker service name 'kimai' on its internal apache port (80)
            proxy_pass http://kimai:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
